name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  # ── React SPA → /domains/infinitypillars.com/public_html/ ──────────────────
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_API_URL: https://infinity-pillars.onrender.com/api
        run: npx vite build --outDir ../../dist/apps/web

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/apps/web/
          server-dir: /domains/infinitypillars.com/public_html/
          timeout: 60000

  # ── Gutenberg blocks plugin → …/blog/wp-content/plugins/ip-blocks/ ─────────
  deploy-wp-plugin:
    runs-on: ubuntu-latest
    env:
      PLUGIN_DIR: /domains/infinitypillars.com/public_html/blog/wp-content/plugins/ip-blocks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Deploy only the root PHP file (rarely changes, tiny payload)
      - name: Deploy plugin PHP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./apps/wp-plugin-ip-blocks/
          server-dir: ${{ env.PLUGIN_DIR }}/
          exclude: |
            ["**/.git*", "**/node_modules/**", "**/src/**", "**/build/**",
             "package.json", "package-lock.json", "webpack.config.js", ".gitignore"]
          timeout: 120000

      # Deploy only the 6 compiled build files (changes on every plugin update)
      - name: Deploy plugin build assets
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./apps/wp-plugin-ip-blocks/build/
          server-dir: ${{ env.PLUGIN_DIR }}/build/
          timeout: 120000

  # ── Custom theme → …/blog/wp-content/themes/ip-theme/ ─────────────────────
  deploy-wp-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy theme to WordPress
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./apps/wp-theme-ip/
          server-dir: /domains/infinitypillars.com/public_html/blog/wp-content/themes/ip-theme/
          exclude: '["**/.git*"]'
          timeout: 60000
